name: pr-bench

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

jobs:
  bench:
    name: Compare PR performance
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-plz-')
    runs-on: namespace-profile-endev-linux-amd64;overrides.cache-tag=aube-rust-linux
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false
      - uses: namespacelabs/nscloud-cache-action@c5f8dab7560444c4bf8dbc64f1b203431873c547 # v1.6.1
        with:
          cache: rust
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false
        env:
          MISE_LOCKED: "1"
      - name: Restore hermetic bench registry cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/aube-bench/registry
          key: aube-bench-registry-${{ runner.os }}-v1

      # Compare fresh base/head measurements from the same runner instead
      # of diffing against committed benchmarks/results.json. The warm
      # install scenario is syscall-heavy enough that stale cross-run
      # baselines routinely look like false regressions.
      - name: Benchmark PR base
        run: |
          if [ -n "$BASE_SHA" ]; then
            git checkout --detach "$BASE_SHA"
            cargo build --release
            RESULTS_JSON=/tmp/aube-bench-base.json \
              BENCH_TOOLS=aube,bun,pnpm \
              BENCH_SCENARIOS=gvs-warm,gvs-cold \
              BENCH_PHASES=0 \
              RUNS=3 \
              WARMUP=1 \
              BENCH_HERMETIC=1 \
              BENCH_BANDWIDTH=500mbit \
              BENCH_LATENCY=50ms \
              AUBE_FORCE_METADATA_PRIMER=true \
              mise x aqua:sharkdp/hyperfine@latest github:pnpm/pnpm@latest bun@latest node@24 -- bash benchmarks/bench.sh
            exit 0
          fi
          cp benchmarks/results.json /tmp/aube-bench-base.json
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

      # TODO: switch pnpm back to `aqua:pnpm/pnpm@latest` once aqua's
      # pnpm registry entry stops looking for `pnpm-linux-x64.tar.gz`
      # (pnpm publishes plain binaries, not tarballs).
      - name: Benchmark PR head
        run: |
          if [ -n "$HEAD_SHA" ]; then
            git checkout --detach "$HEAD_SHA"
          fi
          cargo build --release
          RESULTS_JSON=/tmp/aube-bench-head.json \
            BENCH_TOOLS=aube,bun,pnpm \
            BENCH_SCENARIOS=gvs-warm,gvs-cold \
            BENCH_PHASES=1 \
            RUNS=3 \
            WARMUP=1 \
            BENCH_HERMETIC=1 \
            BENCH_BANDWIDTH=500mbit \
            BENCH_LATENCY=50ms \
            AUBE_FORCE_METADATA_PRIMER=true \
            mise x aqua:sharkdp/hyperfine@latest github:pnpm/pnpm@latest bun@latest node@24 -- bash benchmarks/bench.sh
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Summarize change
        run: node benchmarks/summarize-results-change.mts /tmp/aube-bench-base.json /tmp/aube-bench-head.json > /tmp/aube-bench-summary.md

      - name: Write benchmark summary
        if: github.event_name == 'pull_request'
        run: cat /tmp/aube-bench-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          marker='<!-- aube-pr-bench -->'
          base_short="${BASE_SHA:0:12}"
          head_short="${HEAD_SHA:0:12}"
          {
            printf '%s\n' "$marker"
            cat /tmp/aube-bench-summary.md
            printf '\n'
            printf '_%s vs %s | freshly benchmarked base/head | aube/bun/pnpm | 2 scenarios | 3 runs | 500mbit/50ms | generated by Codex._\n' "$head_short" "$base_short"
          } > /tmp/aube-bench-comment.md

          existing="$(gh api "repos/$GH_REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n1)"
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/$GH_REPO/issues/comments/$existing" \
              --field body="$(cat /tmp/aube-bench-comment.md)"
          else
            gh api --method POST "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
              --field body="$(cat /tmp/aube-bench-comment.md)"
          fi
