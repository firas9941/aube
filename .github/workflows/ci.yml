name: ci

# Full CI matrix for aube — linux, macos, and windows build/test + BATS
# integration shards. This workflow is the canonical CI entry point;
# .buildkite/ is left in place but is expected to be disabled at the
# GitHub-App level so it doesn't double-run or consume vCPU minutes.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]
    tags: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # Build debug artifacts for every OS that runs BATS or needs a binary
  # downstream. Linux + macOS use mise so tool pins and env parity with
  # `mise run build` are guaranteed. Windows ships no BATS run (BATS is
  # bash-only, junction-links kick in on NTFS) so its build + test live
  # in the dedicated `windows` job below.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: namespace-profile-endev-linux-amd64;overrides.cache-tag=aube-rust-linux
          - os: macos-latest
            runner: namespace-profile-endev-macos-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: namespacelabs/nscloud-cache-action@c5f8dab7560444c4bf8dbc64f1b203431873c547 # v1.6.1
        with:
          cache: rust
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - run: mise run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aube-${{ matrix.os }}
          path: target/debug/aube
          retention-days: 1
          if-no-files-found: error

  # Linux-only test + lint + render + docs:build. Matches the
  # `linux / test` step in .buildkite/pipeline.sh. Split from `build` so
  # lint failures don't block the BATS jobs from starting against a
  # known-good binary.
  test-linux:
    runs-on: namespace-profile-endev-linux-amd64;overrides.cache-tag=aube-rust-linux
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: namespacelabs/nscloud-cache-action@c5f8dab7560444c4bf8dbc64f1b203431873c547 # v1.6.1
        with:
          cache: rust
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - run: node benchmarks/validate-results.mts
      - run: mise run test
      - run: mise run lint
      - run: cargo-machete
      - run: mise x cargo:cargo-audit@0.22.1 -- cargo audit --deny warnings
      - run: mise x cargo:cargo-deny@0.19.6 -- cargo deny check bans licenses sources
      - run: cargo msrv --manifest-path crates/aube/Cargo.toml verify --output-format minimal
      - run: mise run render
      - name: assert render produces no diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::'mise run render' produced changes. Run it locally and commit."
            git status
            git diff
            exit 1
          fi
      - run: mise run docs:build

  # Guards the embedding API surfaces `embed` introduced against
  # unintended breaks:
  #   * Rust library crates (aube-codes/aube-settings/aube-util) via
  #     cargo-semver-checks, baselined against main.
  #   * The C ABI export set via the cdylib's dynamic symbol table diffed
  #     against the frozen crates/aube-ffi/abi-symbols.txt manifest.
  # A Rust break is allowed only when the PR is explicitly marked
  # breaking — a `!` in the conventional-commit title (feat(ffi)!: ...),
  # a `BREAKING CHANGE:` footer in the body, or the `breaking-api`
  # label — the same signals that drive release-plz's major bump, so the
  # gate and the version bump agree.
  # Symbol drift always blocks (keeps the manifest honest); removing an
  # export shows as a manifest deletion in the diff and must ride a
  # breaking PR.
  api-stability:
    # PR-time gate only: the checks read `github.event.pull_request.*` and
    # baseline against main, which is meaningless on push/tag/dispatch runs
    # (those fields are undefined there). `final` treats the resulting
    # `skipped` as a pass.
    if: github.event_name == 'pull_request'
    runs-on: namespace-profile-endev-linux-amd64;overrides.cache-tag=aube-rust-linux
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: namespacelabs/nscloud-cache-action@c5f8dab7560444c4bf8dbc64f1b203431873c547 # v1.6.1
        with:
          cache: rust
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - name: Fetch semver baseline
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
      - name: Determine breaking-change override
        id: gate
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          breaking=false
          # conventional-commit breaking marker: type(scope)!: or type!:
          if printf '%s' "$PR_TITLE" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then breaking=true; fi
          # conventional-commit breaking footer in the body (release-plz
          # honors `BREAKING CHANGE:` / `BREAKING-CHANGE:` for the major bump).
          if printf '%s' "$PR_BODY" | grep -qE '^BREAKING[ -]CHANGE:'; then breaking=true; fi
          if printf '%s' "$PR_LABELS" | grep -q '"breaking-api"'; then breaking=true; fi
          echo "breaking=$breaking" >> "$GITHUB_OUTPUT"
          echo "breaking override: $breaking"
      - name: Rust embedding API — cargo-semver-checks
        id: semver
        continue-on-error: true
        # Version pinned in bin/cargo-semver-checks (mise tool-stub).
        run: |
          cargo-semver-checks semver-checks \
            --baseline-rev origin/main \
            --package aube-codes --package aube-settings --package aube-util
      - name: C ABI — frozen export set
        id: ffi
        continue-on-error: true
        run: |
          cargo build --locked --profile ffi -p aube-ffi
          grep -vE '^[[:space:]]*(#|$)' crates/aube-ffi/abi-symbols.txt | sort -u > /tmp/abi-expected.txt
          nm -D --defined-only --extern-only target/ffi/libaube_ffi.so \
            | awk '{ print $3 }' | grep '^aube_' | sort -u > /tmp/abi-actual.txt
          diff -u /tmp/abi-expected.txt /tmp/abi-actual.txt
      - name: Enforce API stability
        if: always()
        env:
          SEMVER: ${{ steps.semver.outcome }}
          FFI: ${{ steps.ffi.outcome }}
          BREAKING: ${{ steps.gate.outputs.breaking }}
        run: |
          fail=0
          if [ "$FFI" = failure ]; then
            echo "::error::C ABI exports drifted from crates/aube-ffi/abi-symbols.txt. Update the manifest to match; removing or renaming an export is a breaking change — also mark the PR breaking (a '!' in the title or the 'breaking-api' label)."
            fail=1
          fi
          if [ "$SEMVER" = failure ]; then
            if [ "$BREAKING" = true ]; then
              echo "::notice::Rust embedding API change is breaking; allowed because this PR is marked breaking."
            else
              echo "::error::A breaking change to a Rust embedding API (aube-codes/aube-settings/aube-util) was detected. If intentional, mark the PR breaking: a '!' in the conventional-commit title (e.g. feat(settings)!: ...), a 'BREAKING CHANGE:' footer in the body, or the 'breaking-api' label."
              fail=1
            fi
          fi
          exit $fail

  # BATS integration shards. Linux runs 4 shards (matches Buildkite),
  # macOS runs 2. Keep these on GitHub-hosted runners: the jail-build
  # tests assert native OS sandbox behavior that does not match the
  # Namespace runner profiles.
  # Each shard downloads the OS-matched debug binary from `build` and
  # invokes mise-task ci:bats:nonserial with its shard index.
  #
  # retry handles the rare BATS flake (process teardown racing npm
  # cache writes, etc.); the Buildkite side has the same retry:1.
  bats:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            shard: 0
            count: 4
          - os: ubuntu-latest
            runner: ubuntu-latest
            shard: 1
            count: 4
          - os: ubuntu-latest
            runner: ubuntu-latest
            shard: 2
            count: 4
          - os: ubuntu-latest
            runner: ubuntu-latest
            shard: 3
            count: 4
          - os: macos-latest
            runner: macos-latest
            shard: 0
            count: 2
          - os: macos-latest
            runner: macos-latest
            shard: 1
            count: 2
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      AUBE_CI_OS: ${{ startsWith(matrix.os, 'ubuntu') && 'linux' || 'macos' }}
      AUBE_BATS_SHARD_INDEX: ${{ matrix.shard }}
      AUBE_BATS_SHARD_COUNT: ${{ matrix.count }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install GNU parallel (ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y parallel
      - name: Install GNU parallel (macos)
        if: startsWith(matrix.os, 'macos')
        run: brew install parallel
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: aube-${{ matrix.os }}
          path: target/debug
      - run: chmod +x target/debug/aube
      - name: Run BATS shard ${{ matrix.shard }}/${{ matrix.count }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 20
          max_attempts: 2
          command: mise run ci:bats:nonserial

  # Serial BATS jobs — tests tagged `serial` that can't run under
  # parallel (e.g. stateful store-lock tests, global env mutation).
  # Keep these paired with the non-serial BATS jobs on GitHub-hosted
  # runners for the same jail-build compatibility reasons.
  bats-serial:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
          - os: macos-latest
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      AUBE_CI_OS: ${{ startsWith(matrix.os, 'ubuntu') && 'linux' || 'macos' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install GNU parallel (ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y parallel
      - name: Install GNU parallel (macos)
        if: startsWith(matrix.os, 'macos')
        run: brew install parallel
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: aube-${{ matrix.os }}
          path: target/debug
      - run: chmod +x target/debug/aube
      - name: Run serial BATS
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 20
          max_attempts: 2
          command: mise run ci:bats:serial

  # Windows parity: build + unit tests + Rust-native e2e smoke. No BATS
  # on Windows — BATS is bash-only and the linker uses NTFS junctions
  # rather than real symlinks (matching pnpm), so we just exercise the
  # cargo test suite to catch platform regressions. Developer Mode is
  # not required on GitHub-hosted windows-latest runners.
  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning] save-if gates writes to main; PRs read-only
        with:
          shared-key: windows
          # Only main may write the shared cache; PRs restore from it but
          # cannot update it. Prevents a malicious PR from poisoning the
          # cache that subsequent main runs / other PRs would restore.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --workspace
      - run: cargo test --workspace

  # Aggregator that required-status-checks can target. If any upstream job
  # failed, was cancelled, or was skipped, this step exits non-zero so the PR is
  # blocked. Lets the branch-protection rule depend on one name instead of ten.
  # Exception: jobs in SKIP_OK below (api-stability, a PR-only gate) are allowed
  # to skip on push/tag/dispatch runs without failing the aggregate.
  final:
    needs:
      - build
      - test-linux
      - bats
      - bats-serial
      - windows
      - api-stability
    runs-on: namespace-profile-endev-linux-amd64
    timeout-minutes: 2
    permissions: {}
    # Run on success or upstream failure but skip when the workflow is cancelled
    # — `always()` would override `cancel-in-progress` and waste a runner.
    if: ${{ !cancelled() }}
    steps:
      - name: Gate on upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          # Jobs whose `if:` legitimately skips them on non-PR runs. A skip
          # here is a pass; every other job must actually succeed.
          SKIP_OK = {"api-stability"}

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = False
          for name, data in sorted(needs.items()):
              result = data.get("result", "unknown")
              if result == "success":
                  print(f"::notice::{name}: {result}")
              elif result == "skipped" and name in SKIP_OK:
                  print(f"::notice::{name}: {result} (allowed to skip)")
              else:
                  print(f"::error::{name}: {result}")
                  failed = True

          if failed:
              print("One or more upstream jobs did not complete successfully.")
              sys.exit(1)

          print("All CI jobs completed successfully.")
          PY
