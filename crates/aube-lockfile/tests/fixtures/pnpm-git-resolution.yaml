lockfileVersion: '9.0'

importers:

  .:
    dependencies:
      from-git:
        specifier: github:foo/bar
        version: 'https://codeload.github.com/foo/bar/tar.gz/abc123'

packages:

  from-git@https://codeload.github.com/foo/bar/tar.gz/abc123:
    resolution: {commit: abc1234567890abcdef1234567890abcdef1234, repo: git+https://github.com/foo/bar.git, type: git}
    version: 1.0.0
    engines: {node: '>=14'}

  scoped-git@git+ssh://git@github.com/foo/scoped.git#deadbeef:
    resolution: {commit: deadbeefdeadbeefdeadbeefdeadbeefdeadbeef, repo: git+ssh://git@github.com/foo/scoped.git, type: git, path: packages/sub}
    version: 2.0.0

snapshots:

  from-git@https://codeload.github.com/foo/bar/tar.gz/abc123: {}

  scoped-git@git+ssh://git@github.com/foo/scoped.git#deadbeef: {}
